name = "telesales-workers"
main = "src/index.ts"
compatibility_date = "2024-01-01"
node_compat = true

[env.production]
name = "telesales-workers"
routes = [
  { pattern = "telesales.salesmind.it/*", zone_name = "salesmind.it" }
]

[[kv_namespaces]]
binding = "KV"
id = "de8093d84a674862b18e6fda6f3b56fa"
preview_id = "de8093d84a674862b18e6fda6f3b56fa"

[triggers]
crons = ["*/5 * * * *"]

[build]
command = "npm run build"
cwd = "."

[vars]
CHECK_INTERVAL_MINUTES = "5"
LOG_LEVEL = "info"

[env.production.vars]
CHECK_INTERVAL_MINUTES = "5"
LOG_LEVEL = "info"

[[env.production.kv_namespaces]]
binding = "KV"
id = "de8093d84a674862b18e6fda6f3b56fa"
preview_id = "de8093d84a674862b18e6fda6f3b56fa"
